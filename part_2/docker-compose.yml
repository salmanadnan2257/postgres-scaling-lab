services:
  db:
    image: postgres:17.0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: events_db
    ports:
      - "5435:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres  -c shared_buffers=256MB -c log_min_duration_statement=100 -c log_destination=stderr -c logging_collector=on -c log_directory=/var/log/postgresql -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log -c log_statement=all -c auto_explain.log_min_duration=100 -c auto_explain.log_analyze=true -c auto_explain.log_buffers=true -c auto_explain.log_timing=true -c shared_preload_libraries=auto_explain
